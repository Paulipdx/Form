{% extends "layout.html" %}

{% block body %}
<style>
  /* Pull the video out of the content-container padding */
  .content-container {
    padding-top: 0 !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
    max-width: 100% !important;
  }

  .hero-video-wrapper {
    width: 100%;
    line-height: 0;
    overflow: hidden;
  }

  .hero-video-wrapper video {
    width: 100%;
    max-height: 88vh;
    object-fit: cover;
    display: block;
  }

  @media (max-width: 768px) {
    .hero-video-wrapper video {
      max-height: 70vh;
    }
  }
</style>

<div class="hero-video-wrapper">
  <video autoplay muted loop playsinline>
    <source src="{{ url_for('static', filename='images/formvideo.mp4') }}" type="video/mp4">
  </video>
</div>

{% endblock %}
